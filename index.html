<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAZY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="canvas" aria-label="HAZY" role="img"></canvas>
  <div class="content">
    <p class="subtitle">Live your life with <span class="accent">social context.</span></p>
    <p class="description">We’re more connected online, and more invisible in real life.<br>HAZY remembers the moments with people around you.</p>
    <div class="waitlist-section">
      <p class="waitlist-label">Join the waitlist</p>
      <form id="waitlist">
        <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
        <button type="submit">→</button>
      </form>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
